<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>GymTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#0f0f14">
</head>
<body>

  <!-- ============ PLAN TAB ============ -->
  <div id="view-plan" class="view">
    <header><h1>🏋️ Plan</h1></header>
    <div id="weeks-list"></div>
    <button class="btn-primary" onclick="addWeek()">＋ Add Week</button>
  </div>

  <!-- ============ CALENDAR TAB ============ -->
  <div id="view-calendar" class="view hidden">
    <header><h1>📅 Calendar</h1></header>
    <div class="cal-nav">
      <button onclick="calMove(-1)">‹</button>
      <span id="cal-title"></span>
      <button onclick="calMove(1)">›</button>
    </div>
    <div class="cal-dow">
      <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <div id="cal-day-detail"></div>
  </div>

  <!-- ============ LIBRARY TAB ============ -->
  <div id="view-library" class="view hidden">
    <header><h1>📚 Exercise Library</h1></header>
    <div id="library-list"></div>
    <button class="btn-primary" onclick="addLibraryExercise()">＋ Add Exercise</button>
  </div>

  <!-- ============ SETTINGS TAB ============ -->
  <div id="view-settings" class="view hidden">
    <header><h1>⚙️ Settings</h1></header>
    <div class="setting-row">
      <span>Units</span>
      <button id="unit-toggle" class="pill" onclick="toggleUnit()"></button>
    </div>
    <div class="setting-row">
      <span>Theme</span>
      <button id="theme-toggle" class="pill" onclick="toggleTheme()"></button>
    </div>
    <div class="setting-row">
      <span>Backup</span>
      <div>
        <button class="pill" onclick="exportData()">Export</button>
        <button class="pill" onclick="importData()">Import</button>
      </div>
    </div>
  </div>

  <!-- ============ DAY / WORKOUT SCREEN ============ -->
  <div id="view-day" class="view hidden">
    <header class="day-header">
      <button class="back-btn" onclick="closeDay()">‹ Back</button>
      <div>
        <h1 id="day-title"></h1>
        <p id="day-subtitle" class="muted"></p>
      </div>
      <span id="duration-display" class="duration">0:00</span>
    </header>
    <div id="day-exercises"></div>
    <button class="btn-secondary" onclick="openPicker()">＋ Add Exercise</button>
    <button id="complete-btn" class="btn-primary" onclick="toggleComplete()"></button>
    <button class="btn-danger" onclick="deleteDay()">🗑 Delete Workout Day</button>
  </div>

  <!-- Exercise picker modal -->
  <div id="picker" class="modal hidden">
    <div class="modal-box">
      <h2>Choose Exercise</h2>
      <input id="picker-search" type="text" placeholder="Search..." oninput="renderPicker()">
      <div id="picker-list"></div>
      <button class="btn-secondary" onclick="closePicker()">Cancel</button>
    </div>
  </div>

  <!-- Rest timer bar -->
  <div id="rest-timer" class="hidden">
    <span>⏱ Rest</span>
    <span id="rest-display">0:00</span>
    <button onclick="skipRest()">Skip ✕</button>
  </div>

  <!-- Bottom navigation -->
  <nav id="tabbar">
    <button data-tab="plan" class="active" onclick="switchTab('plan')">🏋️<span>Plan</span></button>
    <button data-tab="calendar" onclick="switchTab('calendar')">📅<span>Calendar</span></button>
    <button data-tab="library" onclick="switchTab('library')">📚<span>Library</span></button>
    <button data-tab="settings" onclick="switchTab('settings')">⚙️<span>Settings</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
